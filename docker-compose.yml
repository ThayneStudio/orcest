services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  orchestrator:
    build: .
    depends_on:
      - redis
    volumes:
      - ./config:/app/config:ro
    environment:
      - ORCEST_CONFIG=/app/config/orchestrator.yaml
    restart: unless-stopped

volumes:
  redis-data:
