services:
  redis:
    image: redis:7-alpine
    ports:
      # Bind to 0.0.0.0 so worker VMs (separate hosts on the fleet's private
      # subnet) can reach Redis on the orchestrator VM. The security-audit
      # commit b13ccf9 had restricted this to 127.0.0.1, which broke the
      # multi-VM architecture. Rely on network-level isolation (lab subnet,
      # firewall) and Redis AUTH for production exposure.
      - "0.0.0.0:6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    mem_limit: 512m
    networks:
      - orcest

volumes:
  redis-data:

networks:
  orcest:
    name: orcest
