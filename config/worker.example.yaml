# Worker configuration
redis:
  host: redis
  port: 6379
  # socket_timeout: 30          # Seconds before a Redis operation times out
  # socket_connect_timeout: 10  # Seconds before a Redis connection attempt times out

# Unique identifier for this worker
worker_id: "worker-0"
# Directory for temporary repo clones
workspace_dir: "/tmp/orcest-workspaces"

# Which task stream to subscribe to (tasks:claude, tasks:gemini, etc.)
backend: "claude"

runner:
  # Runner implementation (claude, noop, etc.)
  type: claude
  # Timeout in seconds for a single runner invocation
  timeout: 1800
  # Max retries on runner crash
  max_retries: 3
  # Seconds between retries
  retry_backoff: 10
