# Worker configuration
redis:
  host: redis
  port: 6379

worker:
  # Unique identifier for this worker
  id: "worker-0"
  # Directory for temporary repo clones
  workspace_dir: "/tmp/orcest-workspaces"

claude:
  # Timeout in seconds for a single Claude invocation
  timeout: 1800
  # Max retries on Claude crash
  max_retries: 3
