# Orchestrator configuration
redis:
  host: redis
  port: 6379
  # socket_timeout: 30          # Seconds before a Redis operation times out
  # socket_connect_timeout: 10  # Seconds before a Redis connection attempt times out

github:
  # GitHub personal access token (or set GITHUB_TOKEN env var)
  token: ""
  # Repository to manage
  repo: "owner/orcest"

polling:
  # Seconds between GitHub polling cycles
  interval: 60

# Default runner backend for new tasks
default_runner: "claude"

labels:
  blocked: "orcest:blocked"
  needs_human: "orcest:needs-human"
  ready: "orcest:ready"
