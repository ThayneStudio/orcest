services:
  dashboard:
    build: ./dashboard
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DASHBOARD_TOKEN
      - LOCK_TTL_SECONDS=180
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/api/health').then(r => process.exit(r.ok ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 512m
    networks:
      - orcest

networks:
  orcest:
    external: true
    name: orcest
