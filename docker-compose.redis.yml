services:
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - orcest

volumes:
  redis-data:

networks:
  orcest:
    name: orcest
